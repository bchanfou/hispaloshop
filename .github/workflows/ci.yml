name: CI — Hispaloshop

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20'
  PYTHON_VERSION: '3.11'

jobs:

  # ═══════════════════════════════════════════════════════════════════════
  # Backend tests — pytest with MongoDB service
  # ═══════════════════════════════════════════════════════════════════════
  backend-tests:
    name: Backend · pytest
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:6
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand({ping:1})' --quiet"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install backend dependencies
        run: |
          cd backend
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov httpx reportlab

      - name: Wait for MongoDB
        run: |
          for i in {1..30}; do
            if nc -z localhost 27017; then
              echo "MongoDB is up"
              exit 0
            fi
            echo "Waiting for MongoDB... ($i/30)"
            sleep 1
          done
          echo "MongoDB did not start in time"
          exit 1

      - name: Run smoke tests + full non-live suite with coverage
        run: |
          cd backend
          python -m pytest \
            --cov=routes --cov=services --cov=core \
            --cov-report=term --cov-report=xml \
            --junitxml=test-results.xml \
            -v --tb=short
        env:
          # Critical env vars (tests set these via conftest autouse too, but CI
          # passes them explicitly so subprocesses inherit correctly)
          ENV: development
          JWT_SECRET: ${{ secrets.JWT_SECRET || 'ci-test-secret-hispaloshop-32chars-ok!' }}
          MONGO_URL: mongodb://localhost:27017/hispaloshop_test
          DB_NAME: hispaloshop_test
          FRONTEND_URL: http://localhost:3000
          AUTH_BACKEND_URL: http://localhost:8000
          BACKEND_URL: http://localhost:8000
          LOG_LEVEL: WARNING
          # TODO(post-0.3 stabilization, ~1 week): add --cov-fail-under=40 to
          # the pytest command above once the smoke-test suite has stabilized
          # and legacy live-integration tests are either ported or removed.

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-coverage
          path: backend/coverage.xml
          retention-days: 7

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-test-results
          path: backend/test-results.xml
          retention-days: 7

  # ═══════════════════════════════════════════════════════════════════════
  # Frontend unit tests — vitest
  # ═══════════════════════════════════════════════════════════════════════
  frontend-tests:
    name: Frontend · vitest
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Run vitest unit tests
        run: cd frontend && npx vitest run
        env:
          NODE_OPTIONS: --max-old-space-size=4096
          # TODO(post-0.3 stabilization): add --coverage with 30% threshold
          # on context/, features/, and critical components once suite stabilizes.

  # ═══════════════════════════════════════════════════════════════════════
  # Frontend build + lint
  # ═══════════════════════════════════════════════════════════════════════
  frontend-build:
    name: Frontend · build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Build frontend
        run: cd frontend && npm run build
        env:
          REACT_APP_API_URL:    ${{ secrets.REACT_APP_API_URL || 'http://localhost:8000' }}
          REACT_APP_SENTRY_DSN: ${{ secrets.SENTRY_DSN_FRONTEND }}
          REACT_APP_ENVIRONMENT: production
          REACT_APP_SENTRY_RELEASE: ${{ github.sha }}
          GENERATE_SOURCEMAP: 'false'
          CI: false

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/build
          retention-days: 1

  # ═══════════════════════════════════════════════════════════════════════
  # E2E Playwright — runs on main push OR PRs labeled "run-e2e"
  # ═══════════════════════════════════════════════════════════════════════
  e2e-tests:
    name: E2E · playwright
    runs-on: ubuntu-latest
    needs: [frontend-build]
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'run-e2e'))

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies + Playwright browsers
        run: |
          cd frontend
          npm ci
          npx playwright install chromium --with-deps

      - name: Preflight staging readiness and latency
        run: cd frontend && npm run test:smoke:preflight
        env:
          PLAYWRIGHT_BASE_URL: ${{ secrets.STAGING_URL || 'http://localhost:3000' }}
          PLAYWRIGHT_API_URL:  ${{ secrets.STAGING_API_URL || 'http://localhost:8000' }}
          SMOKE_MAX_FRONTEND_MS: '12000'
          SMOKE_MAX_BACKEND_MS: '5000'

      - name: Run the 5 canonical E2E flows
        run: cd frontend && npx playwright test --project=chromium
        env:
          PLAYWRIGHT_BASE_URL: ${{ secrets.STAGING_URL || 'http://localhost:3000' }}
          PLAYWRIGHT_API_URL:  ${{ secrets.STAGING_API_URL || 'http://localhost:8000' }}
          TEST_CONSUMER_EMAIL: ${{ secrets.TEST_CONSUMER_EMAIL }}
          TEST_PRODUCER_EMAIL: ${{ secrets.TEST_PRODUCER_EMAIL }}
          TEST_INFLUENCER_EMAIL: ${{ secrets.TEST_INFLUENCER_EMAIL }}

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: frontend/playwright-report
          retention-days: 7

  # ═══════════════════════════════════════════════════════════════════════
  # Deploy — Vercel (frontend) — gated on all tests passing
  # ═══════════════════════════════════════════════════════════════════════
  deploy-frontend:
    name: Deploy · Vercel
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests, frontend-build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token:   ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id:  ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: frontend
          vercel-args: '--prod'

  # ═══════════════════════════════════════════════════════════════════════
  # Deploy — Railway (backend) — gated on backend tests passing
  # ═══════════════════════════════════════════════════════════════════════
  deploy-backend:
    name: Deploy · Railway
    runs-on: ubuntu-latest
    needs: [backend-tests]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy backend to Railway
        run: railway up --service backend
        working-directory: backend
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

  # ═══════════════════════════════════════════════════════════════════════
  # Deploy notification summary
  # ═══════════════════════════════════════════════════════════════════════
  notify-deploy:
    name: Notify · Deploy completo
    runs-on: ubuntu-latest
    needs: [deploy-frontend, deploy-backend]
    if: always() && github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Deploy summary
        run: |
          echo "## Deploy Hispaloshop" >> $GITHUB_STEP_SUMMARY
          echo "- Commit: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- Frontend: ${{ needs.deploy-frontend.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Backend: ${{ needs.deploy-backend.result }}" >> $GITHUB_STEP_SUMMARY
