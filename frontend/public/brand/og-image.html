<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 1200px; height: 630px;
      background: #0A0A0A;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Inter', sans-serif;
      position: relative;
      overflow: hidden;
    }
    .logo {
      width: 80px;
      margin-bottom: 24px;
      filter: brightness(0) invert(1);
    }
    h1 {
      color: white;
      font-size: 52px;
      font-weight: 700;
      letter-spacing: -0.03em;
      text-align: center;
      line-height: 1.1;
      margin-bottom: 20px;
    }
    p {
      color: rgba(255,255,255,0.55);
      font-size: 20px;
      text-align: center;
      max-width: 600px;
    }
    .green-line {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 4px;
      background: #2E7D52;
    }
    .tag {
      position: absolute;
      top: 40px; right: 40px;
      font-size: 13px;
      color: rgba(255,255,255,0.3);
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }
  </style>
</head>
<body>
  <img class="logo" src="/brand/logo-icon.png" alt="">
  <h1>La alimentaci&oacute;n<br>artesanal espa&ntilde;ola</h1>
  <p>Descubre productores locales. Compra directo.<br>
  Apoya la econom&iacute;a de tu regi&oacute;n.</p>
  <div class="green-line"></div>
  <div class="tag">hispaloshop.com</div>
</body>
</html>
